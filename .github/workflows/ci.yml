name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# הרשאות חובה עבור יצירת טוקן OIDC מול AWS (מחליף את הצורך בסודות קבועים)
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. התחברות ל-AWS ללא ססמאות בעזרת OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::992382545251:role/github-actions-ecr-role-AA
          aws-region: us-east-1

      # 2. קבלת אישור התחברות מ-ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. בנייה ודחיפה של התמונה ל-AWS ECR
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.login-ecr.outputs.registry }}/alon-aviad-repo:status-page-${{ github.run_number }}
 
     # 4. עדכון מאגר ה-GitOps עם כתובת התמונה החדשה
      - name: Update GitOps repository
        shell: bash
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: alon-aviad-repo
          IMAGE_TAG: status-page-${{ github.run_number }}
        run: |
          git config --global credential.helper store
          echo "https://${GIT_TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials
          
          rm -rf gitops
          git clone https://github.com/alondudi/status-page-DevOps.git gitops
          cd gitops
          
          # העדכון משתנה: אנחנו עורכים את values.yaml ומחליפים רק את ה-tag
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s|tag: .*|tag: \"${IMAGE_TAG}\"|g" status-page/values.yaml
          else
            sed -i "s|tag: .*|tag: \"${IMAGE_TAG}\"|g" status-page/values.yaml
          fi
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add status-page/values.yaml # שינוי שם הקובץ שנדחף
          git commit -m "Update image tag to ${IMAGE_TAG} in AWS ECR"
          git push -f https://${GIT_TOKEN}@github.com/alondudi/status-page-DevOps.git main
  
