version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: status-page
      POSTGRES_USER: status-page
      POSTGRES_PASSWORD: avi2788
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: always
    volumes: # <--- הוספנו כאן
      - static_volume:/opt/status-page/statuspage/static # <--- הוספנו כאן

  worker:
    build: .
    command: python3 statuspage/manage.py rqworker --with-scheduler
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/opt/status-page/statuspage/static
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
